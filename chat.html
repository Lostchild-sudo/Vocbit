<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Vocbit - Vocabulary Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h2>Vocabulary Trainer</h2>
    </header>

<main>
    <div class="word-box">
        <h3 id="word">Click Next</h3>
        <p id="meaning"></p>
        <p id="example" style="font-style: italic;"></p>
        <p id="synonyms"></p>
        <p id="antonyms"></p>
    </div>

    <button class="btn" onclick="showRandomWord()">Next Word</button>
<button class="btn" onclick="markAsLearned()">Mark as Learned</button>

<p id="learnedCount" style="margin-top: 15px; color: #333;">
    Learned Words: 0
</p>

<p id="streak" style="margin-top: 10px; color: #4a4aff; font-weight: bold;">
    Streak: 0 Days
</p>
</main>

    <script src="words.js"></script>
    <script src="app.js"></script>

</body>

<script src="app.js"></script>
</html>
