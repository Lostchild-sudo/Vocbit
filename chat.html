<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Vocbit - Vocabulary Trainer</title>

</head>
<body>

    <header>
        <h2>Vocabulary Trainer</h2>
    </header>

<main>

    <script src="app.js"></script>

<script src="app.js"></script>
